<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk | Monitoring IoT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep:       #070c1b;
      --bg-card:       #111827;
      --bg-input:      #0d1424;
      --border-subtle: rgba(56, 189, 248, 0.12);
      --cyan:          #38bdf8;
      --blue:          #2563eb;
      --text-primary:  #f1f5f9;
      --text-muted:    #94a3b8;
      --glow-cyan:     rgba(56, 189, 248, 0.35);
      --glow-blue:     rgba(37, 99, 235, 0.25);
      --radius-card:   18px;
      --radius-input:  12px;
      --radius-btn:    50px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 70%);
      top: -160px; left: -160px;
    }
    body::after {
      width: 460px; height: 460px;
      background: radial-gradient(circle, rgba(56,189,248,0.14) 0%, transparent 70%);
      bottom: -140px; right: -140px;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 20px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-card);
      padding: 44px 40px 40px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 24px 60px rgba(0,0,0,0.55),
        0 0 80px rgba(56,189,248,0.06);
    }

    /* ── Logo ── */
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-mark {
      width: 68px;
      height: 68px;
      background: #ffffff;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 28px var(--glow-cyan);
      overflow: hidden;
      padding: 6px;
    }

    .logo-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .login-logo h1 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text-primary);
    }

    .login-logo h1 strong {
      background: linear-gradient(90deg, var(--cyan), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 0 0 24px;
    }

    /* ── Title ── */
    .login-title {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-title h2 {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .login-title p {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 5px;
      font-weight: 400;
    }

    /* ── Form fields ── */
    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 7px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .input-wrap input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-input);
      color: var(--text-primary);
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      padding: 13px 42px 13px 40px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .input-wrap input::placeholder { color: #475569; }

    .input-wrap input:focus {
      border-color: rgba(56,189,248,0.45);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
    }

    .eye-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 15px;
      padding: 0;
      transition: color 0.2s;
    }
    .eye-toggle:hover { color: var(--cyan); }

    /* ── Remember me ── */
    .remember-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 26px;
      margin-top: 4px;
    }

    .remember-row input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 17px;
      height: 17px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 5px;
      background: var(--bg-input);
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }

    .remember-row input[type="checkbox"]:checked {
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      border-color: transparent;
    }

    .remember-row input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px; top: 2px;
      width: 6px; height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .remember-row label {
      font-size: 0.82rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    /* ── Button ── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(90deg, var(--cyan) 0%, var(--blue) 100%);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      box-shadow: 0 0 20px var(--glow-cyan), 0 4px 15px var(--glow-blue);
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px var(--glow-cyan), 0 8px 24px var(--glow-blue);
    }

    .btn-primary:active { transform: translateY(0); opacity: 0.9; }

    /* ── Back link ── */
    .back-link {
      text-align: center;
      margin-top: 22px;
      font-size: 0.8rem;
    }

    .back-link a {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .back-link a:hover { opacity: 0.75; }

    @media (max-width: 480px) {
      .login-card { padding: 36px 26px 32px; }
    }
  </style>
</head>

        <h1>Monitoring<strong>IoT</strong></h1>
      </div>

      <hr class="divider">

      <!-- Title -->
      <div class="login-title">
        <h2>Selamat Datang</h2>
        <p>Masuk ke dashboard monitoring Anda</p>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrap">
          <span class="input-icon">✉</span>
          <input type="email" id="email" placeholder="nama@email.com" autocomplete="email" />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Kata Sandi</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button class="eye-toggle" type="button" aria-label="Tampilkan sandi" onclick="togglePassword()">👁</button>
        </div>
      </div>

      <!-- Remember me -->
      <div class="remember-row">
        <input type="checkbox" id="remember" />
        <label for="remember">Ingat saya</label>
      </div>

      <!-- Submit -->
      <button class="btn-primary" type="button" onclick="handleLogin()">Masuk</button>

      <div class="back-link">
        <a href="index.html">← Kembali ke Beranda</a>
      </div>

    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.querySelector('.eye-toggle');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || !password) {
        alert('Mohon isi email dan kata sandi.');
        return;
      }
      // firebase.auth().signInWithEmailAndPassword(email, password)...
      console.log('Login:', email);
    }
  </script>
